services:
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile.prod
    container_name: trocandor_app
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - ./backend:/var/www
      - ./docker/php/php.ini:/usr/local/etc/php/conf.d/local.ini
    environment:
      - PHP_OPCACHE_VALIDATE_TIMESTAMPS=0
    networks:
      - trocandor
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy

  nginx:
    image: nginx:alpine
    container_name: trocandor_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./backend:/var/www
      - ./docker/nginx/active.conf:/etc/nginx/conf.d/default.conf
      - ./docker/certbot/conf:/etc/letsencrypt
      - ./docker/certbot/www:/var/www/certbot
    networks:
      - trocandor
    depends_on:
      - app

  scheduler:
    build:
      context: .
      dockerfile: docker/php/Dockerfile.prod
    container_name: trocandor_scheduler
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - ./backend:/var/www
    command: sh -c "while true; do php artisan schedule:run --verbose --no-interaction; sleep 60; done"
    networks:
      - trocandor
    depends_on:
      - app

  queue:
    build:
      context: .
      dockerfile: docker/php/Dockerfile.prod
    container_name: trocandor_queue
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - ./backend:/var/www
    command: php artisan queue:work --sleep=3 --tries=3 --max-time=3600
    networks:
      - trocandor
    depends_on:
      - app
      - redis

  mysql:
    image: mysql:8.0
    container_name: trocandor_mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${DB_DATABASE}
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
      MYSQL_PASSWORD: ${DB_PASSWORD}
      MYSQL_USER: ${DB_USERNAME}
    volumes:
      - trocandor_mysql:/var/lib/mysql
    networks:
      - trocandor
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: trocandor_redis
    restart: unless-stopped
    volumes:
      - trocandor_redis:/data
    networks:
      - trocandor
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3

  certbot:
    image: certbot/certbot
    container_name: trocandor_certbot
    volumes:
      - ./docker/certbot/conf:/etc/letsencrypt
      - ./docker/certbot/www:/var/www/certbot
    networks:
      - trocandor

  node:
    image: node:20-alpine
    container_name: trocandor_node_build
    working_dir: /app
    volumes:
      - .:/app
    profiles:
      - build
    command: sh -c "npm install && npm run build"
    networks:
      - trocandor

networks:
  trocandor:
    driver: bridge

volumes:
  trocandor_mysql:
  trocandor_redis:
